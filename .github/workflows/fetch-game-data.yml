name: Fetch Steam Game Data

on:
  workflow_call:
    inputs:
      trigger_source:
        description: 'Source of the trigger: manual, scheduled, or push'
        required: false
        type: string
        default: 'push'
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'Source of the trigger: manual, scheduled, or push'
        required: false
        type: string
        default: 'manual'

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main

      - name: Copy Python scripts
        run: |
          mkdir -p /tmp/scripts
          cp fetch_game_data.py update_top_owners.py /tmp/scripts/

      - name: Checkout user branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: user

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml playwright
          playwright install chromium

      - name: Update TOP_OWNER_IDS
        run: python /tmp/scripts/update_top_owners.py

      - name: Fetch game data
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BEFORE: ${{ github.event.before }}
          TRIGGER_SOURCE: ${{ inputs.trigger_source }}
        run: python /tmp/scripts/fetch_game_data.py

      - name: Commit changes
        run: |
          set -e

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Stage everything the Python scripts produced BEFORE fetching/merging.
          # Without this, 'git merge' aborts because it would overwrite unstaged
          # modifications to game-data.json / top_owners.json and untracked new
          # game-info.json files — causing the subsequent push to be rejected.
          git add game-data.json top_owners.json
          git add AppID/

          # Nothing changed? Exit early so we don't create an empty commit.
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit to user branch"
            exit 0
          fi

          git commit -m "Update game data [skip ci]"

          # Fetch the latest remote user branch and rebase our commit on top of it.
          # --rebase avoids a merge commit and handles the non-fast-forward case cleanly.
          # -X ours keeps our version of any file that both sides touched.
          git fetch origin user
          git rebase origin/user -X ours

          git push origin user
